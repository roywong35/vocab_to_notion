<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocab to Notion</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 360px;
        background: #ffffff;
        color: #1a1a1a;
      }

      /* ── Header ── */
      .header {
        padding: 18px 16px 8px;
        border-bottom: 1px solid #f0f0f0;
      }

      .word-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
      }

      .word {
        font-size: 26px;
        font-weight: 700;
        color: #1a1a1a;
        word-break: break-word;
        line-height: 1.2;
      }

      .pronunciation {
        font-size: 14px;
        color: #888;
        font-style: italic;
        flex-shrink: 0;
      }

      .speak-btn {
        margin-left: auto;
        flex-shrink: 0;
        background: none;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        width: 28px;
        height: 28px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #666;
        transition: background 0.15s, border-color 0.15s;
      }

      .speak-btn:hover {
        background: #f5f5f5;
        border-color: #bbb;
      }

      .pos-row {
        margin-top: 6px;
      }

      .pos-badge {
        display: inline-block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        padding-left: 9px;
        border-left: 3px solid #555;
        line-height: 1.2;
      }

      /* ── Form body ── */
      .form-body {
        padding: 8px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .field-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .field-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: #aaa;
      }

      .edit-btn {
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
        color: #aaa;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: color 0.15s;
      }

      .edit-btn:hover {
        color: #555;
      }

      .field-value {
        font-size: 13px;
        line-height: 1.55;
        color: #1a1a1a;
        padding: 2px 0;
        word-break: break-word;
      }

      textarea {
        width: 100%;
        resize: vertical;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.55;
        color: #1a1a1a;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        padding: 8px 10px;
        background: #fafafa;
        transition: border-color 0.15s, background 0.15s;
        min-height: 56px;
      }

      textarea:focus {
        outline: none;
        border-color: #aaa;
        background: #fff;
      }

      .example-translation {
        font-size: 12px;
        color: #999;
        font-style: italic;
        line-height: 1.5;
        padding: 0 2px;
        min-height: 18px;
      }

      input[type="text"] {
        width: 100%;
        font-family: inherit;
        font-size: 13px;
        color: #1a1a1a;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        padding: 8px 10px;
        background: #fafafa;
        transition: border-color 0.15s, background 0.15s;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: #aaa;
        background: #fff;
      }

      input[type="text"]::placeholder {
        color: #ccc;
      }

      /* ── Save button ── */
      .save-btn {
        width: 100%;
        padding: 10px;
        background: #1a1a1a;
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 7px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .save-btn:hover {
        background: #333;
      }

      .save-btn:disabled {
        background: #ccc;
        cursor: default;
      }

      /* ── Loading skeleton ── */
      .skeleton {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .skel-line {
        height: 12px;
        border-radius: 4px;
        background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }

      .skel-line.short  { width: 40%; }
      .skel-line.medium { width: 65%; }
      .skel-line.long   { width: 88%; }

      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ── States ── */
      .message {
        padding: 20px 16px;
        font-size: 13px;
        color: #9b9b9b;
        font-style: italic;
        line-height: 1.5;
      }

      .error-text {
        color: #c62828;
        font-style: normal;
        font-weight: 600;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <!-- Empty state -->
    <p id="empty-state" class="message hidden">
      No word selected. Highlight text and right-click to add vocab.
    </p>

    <!-- Main content -->
    <div id="main" class="hidden">

      <!-- Header -->
      <div class="header">
        <div class="word-row">
          <span id="word" class="word"></span>
          <span id="pronunciation" class="pronunciation hidden"></span>
          <button id="speak-btn" class="speak-btn" title="Pronounce">&#128264;</button>
        </div>
        <div class="pos-row">
          <span id="pos-badge" class="pos-badge hidden"></span>
        </div>
      </div>

      <!-- Loading skeleton -->
      <div id="loading" class="skeleton">
        <div class="skel-line medium"></div>
        <div class="skel-line long"></div>
        <div class="skel-line short"></div>
        <div class="skel-line long"></div>
        <div class="skel-line medium"></div>
      </div>

      <!-- Form fields -->
      <div id="form-body" class="form-body hidden">

        <div class="field">
          <div class="field-header">
            <span class="field-label" id="meaning-label">Meaning</span>
            <button class="edit-btn" id="meaning-edit-btn" title="Edit"></button>
          </div>
          <p id="meaning-view" class="field-value"></p>
          <textarea id="meaning-input" rows="3" class="hidden"></textarea>
        </div>

        <div class="field">
          <div class="field-header">
            <span class="field-label" id="example-label">Example</span>
            <button class="edit-btn" id="example-edit-btn" title="Edit"></button>
          </div>
          <p id="example-view" class="field-value"></p>
          <textarea id="example-input" rows="2" class="hidden"></textarea>
          <p id="example-translation" class="example-translation"></p>
        </div>

        <div class="field">
          <span class="field-label" id="tags-label">Tags</span>
          <input type="text" id="tags-input" placeholder="e.g. N2, formal, business" />
        </div>

        <button class="save-btn" id="save-btn" disabled>Save to Notion</button>

      </div>

      <!-- Error state -->
      <p id="error-state" class="message hidden">
        <span class="error-text" id="error-title">Could not load definition.</span><br />
        <span id="error-detail">Check your Gemini API key in config.js and try again.</span>
      </p>

    </div>

    <script src="config.js"></script>
    <script src="llmProvider.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
