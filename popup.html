<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocab to Notion</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 260px;
        padding: 20px;
        background: #ffffff;
        color: #1a1a1a;
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        color: #6b6b6b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 12px;
      }

      #word {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a1a;
        word-break: break-word;
        min-height: 32px;
      }

      #empty {
        font-size: 13px;
        color: #9b9b9b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h1>Selected Word</h1>
    <p id="word"></p>
    <p id="empty" style="display: none">
      No word selected. Highlight text and right-click to add vocab.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
